name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run test:unit

      # Source: https://github.com/changesets/changesets/blob/main/docs/command-line-options.md
      # changeset version: consumes pending changeset files, bumps package.json, generates changelog
      # changeset tag: creates git tags for current versions WITHOUT publishing (used when a different publish tool handles npm)
      # changeset publish: publishes AND creates git tags, but does not support --provenance flag
      # This workflow uses changeset tag + custom release:ci (npm publish --provenance) to get both git tags and trusted publishing provenance.
      # Source: https://docs.npmjs.com/trusted-publishers/ — trusted publishing requires id-token: write and --provenance flag
      # Source: https://github.com/changesets/changesets/issues/1575 — changeset status exit code is unreliable for detecting pending changesets
      - name: Version and publish if changesets exist
        run: |
          # Check for pending changeset files (not changeset status which has unreliable exit codes)
          CHANGESET_FILES=$(ls .changeset/*.md 2>/dev/null | grep -v README.md | head -1)
          if [ -z "$CHANGESET_FILES" ]; then
            echo "No pending changesets. Skipping."
            exit 0
          fi
          npm run version-packages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Version packages"
          # changeset tag creates git tags for current package versions without publishing
          npx changeset tag
          git push --follow-tags
          # release:ci handles npm publish with --provenance for trusted publishing
          npm run release:ci
          # Create GitHub Release with auto-generated notes
          # Source: https://docs.github.com/en/repositories/releasing-projects-on-github/managing-releases-in-a-repository
          VERSION="$(node -p 'require("./package.json").version')"
          gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
